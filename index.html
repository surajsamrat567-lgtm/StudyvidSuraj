<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf2f7;
}

.page{
display:none;
}

.page.active{
display:block;
}
/* ===== Ultra Premium Background ===== */

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at top left,#60a5fa 0%,transparent 30%),
radial-gradient(circle at bottom right,#22c55e 0%,transparent 30%),
linear-gradient(135deg,#071226,#0f172a,#111827,#1e3a8a);
background-size:cover;
min-height:100vh;
overflow-x:hidden;
}

/* ===== Title ===== */

.title{

text-align:center;

font-size:56px;

font-weight:900;

color:white;

margin-top:40px;

letter-spacing:2px;

text-shadow:

0 0 15px rgba(255,255,255,.4),

0 8px 25px rgba(0,0,0,.5);

}

/* ===== Menu ===== */

.menu{

width:95%;
max-width:720px;
margin:50px auto;

display:flex;

flex-direction:column;

gap:30px;

}

/* ===== Ultra 3D Button ===== */

.menuBtn{

position:relative;

padding:28px;

font-size:24px;

font-weight:800;

color:#fff;

border:none;

border-radius:24px;

cursor:pointer;

overflow:hidden;

transition:.25s;

box-shadow:

0 18px 0 rgba(0,0,0,.45),

0 35px 55px rgba(0,0,0,.45),

inset 0 3px 5px rgba(255,255,255,.35),

inset 0 -5px 8px rgba(0,0,0,.25);

}

.menuBtn::before{

content:"";

position:absolute;

top:-60%;

left:-20%;

width:140%;

height:70%;

background:rgba(255,255,255,.28);

transform:rotate(-8deg);

transition:.35s;

}

.menuBtn:hover::before{

top:110%;

}

.menuBtn:hover{

transform:

translateY(-8px)

scale(1.02);

filter:brightness(1.08);

}

.menuBtn:active{

transform:translateY(10px);

box-shadow:

0 6px 0 rgba(0,0,0,.45),

0 10px 20px rgba(0,0,0,.35);

}

/* ===== Colors ===== */

.green{

background:linear-gradient(180deg,#4ade80,#15803d);

}

.blue{

background:linear-gradient(180deg,#38bdf8,#1d4ed8);

}

.orange{

background:linear-gradient(180deg,#fbbf24,#d97706);

}

.red{

background:linear-gradient(180deg,#fb7185,#be123c);

}

.purple{

background:linear-gradient(180deg,#c084fc,#7e22ce);

}
#fullscreenBtn{

position:fixed;

top:18px;

right:20px;

padding:14px 26px;

border:none;

border-radius:16px;

font-size:18px;

font-weight:bold;

cursor:pointer;

color:white;

background:linear-gradient(180deg,#2563eb,#1d4ed8);

box-shadow:
0 8px 0 #1e40af,
0 18px 30px rgba(0,0,0,.35);

z-index:9999;

transition:.2s;

}

#fullscreenBtn:hover{

transform:translateY(-3px);

}

#fullscreenBtn:active{

transform:translateY(6px);

box-shadow:
0 3px 0 #1e40af;

}
/* ===== Mock Screen ===== */

.mockContainer{

display:flex;

flex-wrap:wrap;

gap:25px;

padding:25px;

align-items:flex-start;

}

/* Left Side */

.leftPanel{

flex:1;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border-radius:25px;

padding:25px;

box-shadow:

0 20px 45px rgba(0,0,0,.35);

}

/* Right Side */

.rightPanel{

position:sticky;

width:100%;

max-width:260px;



top:10px;

width:260px;

height:90vh;

overflow-y:auto;

overflow-x:hidden;

background:white;

padding:15px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}

/* Timer */

.topBar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

#timer{

font-size:30px;

font-weight:bold;

color:#00ff95;

text-shadow:0 0 12px #00ff95;

}

/* Question */

.question{

display:none;

background:white;

padding:28px;

border-radius:22px;

box-shadow:

0 15px 35px rgba(0,0,0,.18);

animation:fade .3s;

}

.question h3{

font-size:24px;

margin-bottom:25px;

line-height:38px;

}

/* Options */

.option{

display:flex;

align-items:center;

padding:18px;

margin:16px 0;

border-radius:18px;

background:#fff;

border:2px solid #dcdcdc;

cursor:pointer;

font-size:19px;

transition:.25s;

box-shadow:

0 8px 18px rgba(0,0,0,.08);

}

.option:hover{

transform:translateX(8px);

border-color:#2196F3;

box-shadow:

0 12px 28px rgba(33,150,243,.25);

}

.option input{

transform:scale(1.4);

margin-right:15px;

}

/* Buttons */

.navigation{

margin-top:30px;

display:flex;

flex-wrap:wrap;

gap:15px;

justify-content:center;

}

.navigation button{

padding:16px 28px;

border:none;

border-radius:18px;

font-size:17px;

font-weight:bold;

cursor:pointer;

color:white;

transition:.2s;

box-shadow:

0 8px 0 rgba(0,0,0,.28),

0 15px 28px rgba(0,0,0,.25);

}

.navigation button:hover{

transform:translateY(-3px);

}

.navigation button:active{

transform:translateY(6px);

box-shadow:

0 3px 0 rgba(0,0,0,.3);

}

#prevBtn{

background:linear-gradient(#f59e0b,#d97706);

}

#nextBtn{

background:linear-gradient(#38bdf8,#2563eb);

}

#submitBtn{

background:linear-gradient(#ef4444,#b91c1c);

}

#reviewBtn{

background:linear-gradient(#a855f7,#6d28d9);

}

#clearBtn{

background:linear-gradient(#6b7280,#374151);

}

/* Palette */

#palette{

display:grid;

grid-template-columns:repeat(4,55px);

gap:12px;

justify-content:center;

}

.pbtn{

width:58px;

height:58px;

border:none;

border-radius:15px;

font-weight:bold;

font-size:18px;

cursor:pointer;

background:white;

box-shadow:

0 7px 0 #bdbdbd,

0 12px 22px rgba(0,0,0,.2);

transition:.2s;

}

.pbtn:hover{

transform:translateY(-2px);

}

.pbtn.active{

background:#ffd54f;

box-shadow:0 6px 0 #f57f17;

}

.pbtn.answered{

background:#22c55e;

color:white;

box-shadow:0 6px 0 #15803d;

}
.correct{
background:#4CAF50 !important;
color:white !important;
border:2px solid #2E7D32 !important;
}

.wrong{
background:#f44336 !important;
color:white !important;
border:2px solid #b71c1c !important;
}
.resultBtn{

padding:15px 28px;

margin:10px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:bold;

cursor:pointer;

color:#fff;

transition:.25s;

box-shadow:0 10px 20px rgba(0,0,0,.30);

}

.homeBtn{

background:linear-gradient(135deg,#00c853,#2e7d32);

}

.homeBtn:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 15px 30px rgba(0,200,83,.45);

}

.restartBtn{

background:linear-gradient(135deg,#ff9800,#ef6c00);

}

.restartBtn:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 15px 30px rgba(255,152,0,.45);

}

.resultBtn:active{

transform:translateY(4px);

}
@media (max-width:768px){

.title{

font-size:32px;

margin-top:20px;

}

.menu{

width:95%;

}

.mockContainer{

flex-direction:column;

padding:10px;

.leftPanel{

width:100%;

}

.rightPanel{

width:100%;

max-width:100%;

height:auto;

margin-top:20px;

.question h3{

font-size:20px;

line-height:30px;

.option{

font-size:16px;

padding:14px;

}

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.navigation button{

width:100%;

}

#palette{

grid-template-columns:repeat(5,1fr);

}

.pbtn{

width:50px;

height:50px;

}

}
</style>

</head>

//====================================
// GLOBAL VARIABLES
//====================================

let currentSubject="";

let currentQuestion=0;

let currentQuestions=[];

let userAnswers=[];

let reviewQuestions=[];

let subjectTime = {

maths:7200,          // 2 घंटे

reasoning:3600,      // 1 घंटा

english:2700,        // 45 मिनट

gs:3600,             // 1 घंटा

computer:1800,       // 30 मिनट

currentaffairs:1200, // 20 मिनट

neet:600,          // 10 minute

fullmock:7200

};
//====================================
// START SUBJECT
//====================================

function startSubject(subject){

currentSubject=subject;

document.getElementById("mockTitle").innerHTML=
subject.toUpperCase()+" Mock Test";

showPage("mock");

timerSeconds = subjectTime[subject];

loadQuestions();

}

//====================================
// LOAD QUESTIONS
//====================================

function loadQuestions(){

currentQuestions=questionBank[currentSubject];

currentQuestion=0;

userAnswers=new Array(currentQuestions.length).fill(null);

renderQuestions();

createPalette();

showQuestion();

}

//====================================
// RENDER QUESTIONS
//====================================

function renderQuestions(){

let html="";

currentQuestions.forEach(function(q,index){

html+=`

<div class="question">

<h3>Q${index+1}. ${q.question}</h3>

`;

q.options.forEach(function(option,i){

html+=`

<label class="option">

<input
type="radio"
name="q${index}"
value="${i}"
onchange="saveAnswer(${index},${i})">

${String.fromCharCode(65+i)}.
${option}

</label>

`;

});

html+=`

</div>

`;

});

document.getElementById("questions").innerHTML=html;

}

//====================================
// SAVE ANSWER
//====================================

function saveAnswer(questionNo,optionNo){

userAnswers[questionNo]=optionNo;

let btns=document.querySelectorAll(".pbtn");

if(btns[questionNo]){
btns[questionNo].classList.add("answered");
}

let question=document.querySelectorAll(".question")[questionNo];

let labels=question.querySelectorAll(".option");

labels.forEach(function(label){
label.classList.remove("correct");
label.classList.remove("wrong");
});

let correct=currentQuestions[questionNo].answer;

if(optionNo==correct){

labels[correct].classList.add("correct");

}else{

labels[optionNo].classList.add("wrong");

labels[correct].classList.add("correct");

}

}
//====================================
// CREATE QUESTION PALETTE
//====================================

function createPalette(){

const palette=document.getElementById("palette");

palette.innerHTML="";

currentQuestions.forEach(function(q,index){

let btn=document.createElement("button");

btn.className="pbtn";

btn.innerHTML=index+1;

btn.onclick=function(){

currentQuestion=index;

showQuestion();

};

palette.appendChild(btn);

});

}

//====================================
// SHOW QUESTION
//====================================

function showQuestion(){

const questions=document.querySelectorAll(".question");

questions.forEach(function(q){

q.style.display="none";

});

if(questions.length==0) return;

questions[currentQuestion].style.display="block";

let btns=document.querySelectorAll(".pbtn");

btns.forEach(function(btn){

btn.classList.remove("active");

});

btns[currentQuestion].classList.add("active");

updateButtons();

}

//====================================
// UPDATE BUTTONS
//====================================

function updateButtons(){

const prev=document.getElementById("prevBtn");

const next=document.getElementById("nextBtn");

if(currentQuestion==0){

prev.disabled=true;

}else{

prev.disabled=false;

}

if(currentQuestion==currentQuestions.length-1){

next.innerHTML="Finish ▶";

}else{

next.innerHTML="Save & Next ▶";

}

}

//====================================
// NEXT BUTTON
//====================================

document.getElementById("nextBtn").onclick=function(){

if(currentQuestion<currentQuestions.length-1){

currentQuestion++;

showQuestion();

}else{

alert("Last Question Reached");

}

};

//====================================
// PREVIOUS BUTTON
//====================================

document.getElementById("prevBtn").onclick=function(){

if(currentQuestion>0){

currentQuestion--;

showQuestion();

}

};
//====================================
// SUBMIT TEST
//====================================

document.getElementById("submitBtn").onclick=function(){

clearInterval(countdown);

let correct=0;
let wrong=0;
let unanswered=0;

currentQuestions.forEach(function(q,index){

if(userAnswers[index]==null){

unanswered++;

}
else if(userAnswers[index]==q.answer){

correct++;

}
else{

wrong++;

}

});

document.getElementById("score").innerHTML=

"<h2>Result</h2>"+

"<br>Total Questions : "+currentQuestions.length+

"<br>✅ Correct : "+correct+

"<br>❌ Wrong : "+wrong+

"<br>⭕ Unanswered : "+unanswered+

"<br><br><h2>Score : "+correct+"/"+currentQuestions.length+"</h2>"+

"<br><br>"+

"<div style='display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-top:35px;'>"+

"<button onclick='goHome()' style='width:240px;height:65px;border:none;border-radius:20px;font-size:22px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#00ff88,#00994d);box-shadow:0 0 15px #00ff88,0 0 35px rgba(0,255,136,.7),0 12px 25px rgba(0,0,0,.45);cursor:pointer;'>🏠 HOME PAGE</button>"+

"<button onclick='restartTest()' style='width:240px;height:65px;border:none;border-radius:20px;font-size:22px;font-weight:bold;color:#fff;background:linear-gradient(135deg,#ff9800,#ff3d00);box-shadow:0 0 15px #ff9800,0 0 35px rgba(255,152,0,.7),0 12px 25px rgba(0,0,0,.45);cursor:pointer;'>🔄 RESTART TEST</button>"+

"</div>";

};

//====================================
// CLEAR RESPONSE
//====================================

document.getElementById("clearBtn").onclick=function(){

let radios=document.getElementsByName("q"+currentQuestion);

radios.forEach(function(r){

r.checked=false;

});

userAnswers[currentQuestion]=null;

};

//====================================
// REVIEW
//====================================

document.getElementById("reviewBtn").onclick=function(){

let btn=document.querySelectorAll(".pbtn")[currentQuestion];

btn.style.background="#9C27B0";

btn.style.color="white";

};

//====================================
// TIMER
//====================================

let timer=document.getElementById("timer");

let countdown =
setInterval(function(){

let min=Math.floor(timerSeconds/60);

let sec=timerSeconds%60;

if(sec<10){

sec="0"+sec;

}

timer.innerHTML=min+":"+sec;

if(timerSeconds>0){

timerSeconds--;

}
else{

document.getElementById("submitBtn").click();

}

},1000);
//====================================
// FULL SCREEN
//====================================

const fullBtn=document.getElementById("fullscreenBtn");

if(fullBtn){

fullBtn.onclick=function(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

fullBtn.innerHTML="❎ Exit Full Screen";

}else{

document.exitFullscreen();

}

};

document.addEventListener("fullscreenchange",function(){

if(document.fullscreenElement){

fullBtn.innerHTML="❎ Exit Full Screen";

}else{

fullBtn.innerHTML="⛶ Full Screen";

}

});

}

//====================================
// PALETTE UPDATE
//====================================

document.addEventListener("change",function(e){

if(e.target.type!="radio") return;

let btn=document.querySelectorAll(".pbtn")[currentQuestion];

if(btn){

btn.classList.add("answered");

}

});

showPage("home");

//==============================
// PRACTICE MODE
//==============================

document.addEventListener("change", function(e){

if(e.target.type!="radio") return;

let question=e.target.closest(".question");

let qIndex=[...document.querySelectorAll(".question")].indexOf(question);

let correct=currentQuestions[qIndex].answer;

let options=question.querySelectorAll(".option");

options.forEach(function(opt,index){

opt.classList.remove("correct");
opt.classList.remove("wrong");

});

if(e.target.value==correct){

options[correct].classList.add("correct");

}else{

options[e.target.value].classList.add("wrong");

options[correct].classList.add("correct");

}

});

function goHome(){

clearInterval(countdown);

document.getElementById("score").innerHTML="";

document.getElementById("questions").innerHTML="";

showPage("home");

}

function restartTest(){

clearInterval(countdown);

document.getElementById("score").innerHTML="";

startSubject(currentSubject);

}

</script>
